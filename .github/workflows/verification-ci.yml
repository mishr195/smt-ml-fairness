name: Verification CI

on:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Directory Structure
      run: |
        python -c "
        import os
        required_files = [
            'src/__init__.py',
            'src/cli.py',
            'src/ml_parser/__init__.py',
            'src/ml_parser/model_loader.py',
            'src/ml_parser/node_extractor.py',
            'src/smt_engine/__init__.py',
            'src/smt_engine/variable_registry.py',
            'src/smt_engine/activations.py',
            'src/smt_engine/formula_builder.py',
            'src/verifier/__init__.py',
            'src/verifier/fairness_properties.py',
            'src/verifier/engine_loop.py',
            'src/verifier/diagnostic_report.py',
            'tests/__init__.py',
            'tests/test_parser_shapes.py',
            'tests/test_solver_logic.py',
            'docs/math_specifications.tex',
            'docs/system_architecture.md',
            'config/fairness_presets.json',
            'config/logging.conf',
            'models/.gitkeep',
            '.gitignore',
            'requirements.txt',
            'README.md'
        ]
        for f in required_files:
            if not os.path.exists(f):
                print(f'Missing required file: {f}')
                exit(1)
        print('All blueprint files verified successfully.')
        "
